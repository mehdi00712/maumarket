<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Item Details | MauMarket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="amazon-topbar">
  <a class="brand logo-brand" href="index.html">
    <img src="images/maumarketlogo.png" alt="MauMarket">
  </a>

  <div class="amazon-search">
    <select>
      <option>All</option>
    </select>

    <input id="detailsSearchInput" placeholder="Search MauMarket">

    <button id="detailsSearchBtn" type="button">Search</button>
  </div>

  <nav>
    <a href="products.html">Marketplace</a>
    <a href="cart.html">Cart</a>
    <a href="dashboard.html">Dashboard</a>
  </nav>
</header>

<div class="amazon-subnav">
  <a href="products.html">All</a>
  <a href="products.html?category=Beauty">Beauty</a>
  <a href="products.html?category=Electronics">Electronics</a>
  <a href="products.html?category=Fashion">Fashion</a>
  <a href="products.html?category=Food">Food</a>
  <a href="products.html?category=Hardware">Hardware</a>
  <a href="products.html?category=Home">Home</a>
  <a href="products.html?category=Services">Services</a>
  <a href="products.html?category=Other">Other</a>
</div>

<main class="product-page">

  <section class="buyer-trust-strip">
    <div>
      <strong>Secure Shopping</strong>
      <span>Shop safely with MauMarket protection</span>
    </div>

    <div>
      <strong>Verified Seller</strong>
      <span>Seller identity checked by MauMarket</span>
    </div>

    <div>
      <strong>Tracked Delivery</strong>
      <span>Delivery handled through MauMarket</span>
    </div>
  </section>

  <div id="detailsBox" class="pro-details-box">Loading...</div>

  <section class="related-section">
    <div class="section-row-title">
      <h2>Related Items</h2>
      <a href="products.html">View all</a>
    </div>

    <div id="relatedItems" class="pro-product-grid"></div>
  </section>

</main>

<script>
  const detailsSearchInput = document.getElementById("detailsSearchInput");
  const detailsSearchBtn = document.getElementById("detailsSearchBtn");

  function runDetailsSearch() {
    const search = detailsSearchInput.value.trim();

    window.location.href = search
      ? `products.html?search=${encodeURIComponent(search)}`
      : "products.html";
  }

  detailsSearchBtn.addEventListener("click", runDetailsSearch);

  detailsSearchInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      event.preventDefault();
      runDetailsSearch();
    }
  });
</script>

<script type="module" src="js/product-details.js?v=4.7-clean-buyer"></script>

</body>
</html>
