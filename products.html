<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marketplace | MauMarket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="market-mobile-header">
  <div class="mobile-top-row">
    <a class="brand" href="index.html">MauMarket</a>
    <button id="mobileMenuBtn" class="hamburger-btn">☰</button>
  </div>

  <div class="mobile-search">
    <select id="typeFilter">
      <option value="">All</option>
      <option value="product">Products</option>
      <option value="service">Services</option>
    </select>

    <input id="searchInput" placeholder="Search MauMarket">
    <button id="searchBtn">Search</button>
  </div>

  <nav id="mobileNav" class="mobile-nav">
    <a href="dashboard.html">Account</a>
    <a href="my-orders.html">Orders</a>
    <a href="cart.html">Cart</a>
    <a href="register.html">Sell</a>
  </nav>
</header>

<div class="market-category-strip">
  <a href="products.html">All</a>
  <a href="products.html?category=Beauty">💄 Beauty</a>
  <a href="products.html?category=Electronics">📱 Electronics</a>
  <a href="products.html?category=Fashion">👕 Fashion</a>
  <a href="products.html?category=Food">🍔 Food</a>
  <a href="products.html?category=Hardware">🔨 Hardware</a>
  <a href="products.html?category=Home">🏠 Home</a>
  <a href="products.html?category=Services">🧰 Services</a>
</div>

<section id="topAdBanner" class="top-ad-banner"></section>

<section class="compact-hero">
  <h1>Shop local deals in Mauritius</h1>
  <p>Products and services from approved MauMarket sellers.</p>
</section>

<section id="featuredShopsSection" class="featured-shops-section">
  <div class="section-row-title">
    <h2>Featured Shops</h2>
    <a href="products.html">View all</a>
  </div>
  <div id="featuredShops" class="featured-shops-row"></div>
</section>

<main class="market-layout">

  <aside class="market-sidebar">
    <h3>Filters</h3>

    <label>Category</label>
    <select id="categoryFilter">
      <option value="">All Categories</option>
      <option value="Beauty">Beauty</option>
      <option value="Electronics">Electronics</option>
      <option value="Fashion">Fashion</option>
      <option value="Food">Food</option>
      <option value="Hardware">Hardware</option>
      <option value="Home">Home</option>
      <option value="Services">Services</option>
      <option value="Other">Other</option>
    </select>

    <label>Sort</label>
    <select id="sortFilter">
      <option value="newest">Newest</option>
      <option value="low-high">Price Low to High</option>
      <option value="high-low">Price High to Low</option>
    </select>
  </aside>

  <section>
    <div class="market-heading compact-heading">
      <h2>Featured Products & Services</h2>
      <p id="resultCount"></p>
    </div>

    <div id="productsGrid" class="market-product-grid"></div>
  </section>

</main>

<script type="module" src="js/products.js"></script>
</body>
</html>
