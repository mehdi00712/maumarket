<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seller Dashboard | MauMarket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <a class="brand logo-brand" href="index.html">
  <img src="images/maumarketlogo.png" alt="MauMarket">
  </a>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="seller-orders.html">Orders</a>
    <a href="seller-earnings.html">Earnings</a>
    <a href="seller-analytics.html">Analytics</a>
    <a href="products.html">Marketplace</a>
  </nav>
</header>

<main class="container">

  <section class="form-card">
    <h1>Your Shop</h1>

    <input id="shopName" placeholder="Shop name">
    <textarea id="shopDescription" placeholder="Shop description"></textarea>
    <input id="shopPhone" placeholder="Shop phone">
    <input id="shopLocation" placeholder="Shop location">

    <label>Shop Logo</label>
    <input id="shopLogo" type="file" accept="image/*">

    <label>Shop Banner</label>
    <input id="shopBanner" type="file" accept="image/*">

    <button id="saveShopBtn">Save Shop</button>
    <p id="shopMessage"></p>
  </section>

  <section class="form-card">
    <h1>Product Slots</h1>
    <p id="slotInfo">Loading slots...</p>
    <button id="requestSlotsBtn">Request More Slots</button>
    <p id="slotMessage"></p>
  </section>

  <section class="form-card">
    <h1 id="formTitle">Add Product / Service</h1>

    <select id="itemType">
      <option value="product">Product</option>
      <option value="service">Service</option>
    </select>

    <input id="itemTitle" placeholder="Title">
    <textarea id="itemDescription" placeholder="Description"></textarea>
    <input id="itemPrice" type="number" placeholder="Price in Rs">
    <input id="itemStock" type="number" placeholder="Stock quantity">

    <select id="itemCategory">
      <option value="Beauty">Beauty</option>
      <option value="Electronics">Electronics</option>
      <option value="Fashion">Fashion</option>
      <option value="Food">Food</option>
      <option value="Hardware">Hardware</option>
      <option value="Home">Home</option>
      <option value="Services">Services</option>
      <option value="Other">Other</option>
    </select>

    <input id="serviceArea" placeholder="Service area, example: Port Louis, Curepipe">

    <label>Image</label>
    <input id="itemImage" type="file" accept="image/*">

    <button id="saveItemBtn">Add Item</button>
    <button id="cancelEditBtn" class="secondary-btn" style="display:none;">Cancel Edit</button>
    <p id="itemMessage"></p>
  </section>

  <section>
    <h1>Your Items</h1>
    <div id="myItems" class="cards"></div>
  </section>

</main>

<script type="module" src="js/seller.js"></script>
</body>
</html>
