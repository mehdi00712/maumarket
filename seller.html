<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seller Dashboard | MauMarket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <h2>Seller Dashboard</h2>
  <a href="dashboard.html">Back</a>
</header>

<main class="container">
  <h1>Create Your Shop</h1>

  <div class="form-card">
    <input id="shopName" placeholder="Shop name">
    <textarea id="shopDescription" placeholder="Shop description"></textarea>
    <input id="shopPhone" placeholder="Shop phone">
    <input id="shopLocation" placeholder="Shop location">

    <button id="saveShopBtn">Save Shop</button>
    <p id="message"></p>
  </div>
</main>

<script type="module" src="js/seller.js"></script>
</body>
</html>
