<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | MauMarket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <h2>MauMarket Checkout</h2>
  <nav>
    <a href="products.html">Marketplace</a>
    <a href="cart.html">Cart</a>
    <a href="dashboard.html">Dashboard</a>
  </nav>
</header>

<main class="container">
  <h1>Checkout</h1>

  <section class="form-card">
    <h2>Delivery Details</h2>

    <input id="customerName" placeholder="Full name">
    <input id="customerPhone" placeholder="Phone number">
    <textarea id="deliveryAddress" placeholder="Delivery address"></textarea>
    <textarea id="orderNotes" placeholder="Order notes optional"></textarea>

    <h2>Order Summary</h2>
    <div id="checkoutItems"></div>

    <div class="cart-summary">
      <p>Items Total: Rs <span id="itemsTotal">0</span></p>
      <p>Delivery Fee: Rs <span id="deliveryFee">150</span></p>
      <h2>Total to Pay: Rs <span id="grandTotal">0</span></h2>
    </div>

    <div class="juice-box">
      <h2>Pay with Juice</h2>
      <p><strong>Pay to:</strong> MauMarket</p>
      <p><strong>Juice Number:</strong> +230 5775 0662</p>
      <p>Pay the total amount first, then upload your Juice payment screenshot below.</p>
    </div>

    <label>Upload Juice Payment Screenshot</label>
    <input id="paymentProof" type="file" accept="image/*">

    <button id="placeOrderBtn">Submit Payment & Place Order</button>
    <p id="checkoutMessage"></p>
  </section>
</main>

<script type="module" src="js/checkout.js"></script>
</body>
</html>
