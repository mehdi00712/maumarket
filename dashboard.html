<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | MauMarket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="market-mobile-header">
  <div class="mobile-top-row">
    <a href="dashboard.html" class="logo-brand">
      <img src="images/maumarketlogo.png" alt="MauMarket">
    </a>

    <button id="dashboardMenuBtn" class="hamburger-btn" type="button">☰</button>
  </div>

  <div class="mobile-search">
    <select>
      <option>All</option>
    </select>

    <input id="dashboardSearchInput" placeholder="Search MauMarket">
    <button id="dashboardSearchBtn" type="button">Search</button>
  </div>

  <nav id="dashboardNav" class="mobile-nav">
    <a href="products.html">Marketplace</a>
    <a href="wishlist.html">❤️ Wishlist</a>
    <a href="cart.html">🛒 Cart</a>
    <a href="my-orders.html">📦 Orders</a>
    <button id="logoutBtn" type="button">Logout</button>
  </nav>
</header>

<main class="dashboard-page">

  <section class="dashboard-hero">
    <div>
      <span id="roleBadge" class="hero-badge">Account</span>

      <h1 id="welcome">
        Loading...
      </h1>

      <p id="status">
        Manage your MauMarket account from one place.
      </p>
    </div>
  </section>

  <section id="quickStats" class="dashboard-stats">

    <!-- dashboard.js will populate -->

  </section>

  <section>

    <div class="dashboard-section-title">
      <h2>Your Control Center</h2>
      <p>Choose what you want to manage.</p>
    </div>

    <div id="actions" class="dashboard-grid">

      <!-- dashboard.js will populate -->

    </div>

    <!-- Wishlist shortcut -->
    <div class="form-card" style="margin-top:20px;">
      <h3>❤️ Wishlist</h3>

      <p>
        Save products and services you want to buy later.
      </p>

      <a href="wishlist.html" class="btn">
        Open Wishlist
      </a>
    </div>

  </section>

</main>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
