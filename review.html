<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Order | MauMarket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="amazon-topbar">
  <a class="brand" href="index.html">MauMarket</a>

  <div class="amazon-search">
    <select>
      <option>All</option>
    </select>
    <input placeholder="Search MauMarket">
    <button onclick="window.location.href='products.html'">Search</button>
  </div>

  <nav>
    <a href="my-orders.html">My Orders</a>
    <a href="products.html">Marketplace</a>
    <a href="dashboard.html">Dashboard</a>
  </nav>
</header>

<div class="amazon-subnav">
  <a href="products.html">All</a>
  <a href="products.html?category=Beauty">Beauty</a>
  <a href="products.html?category=Electronics">Electronics</a>
  <a href="products.html?category=Fashion">Fashion</a>
  <a href="products.html?category=Food">Food</a>
  <a href="products.html?category=Hardware">Hardware</a>
  <a href="products.html?category=Services">Services</a>
</div>

<main class="container">
  <section class="form-card review-page-card">
    <h1>Leave a Verified Review</h1>
    <p class="muted">You can review this order because it has been delivered.</p>

    <div id="orderBox">Loading...</div>

    <label>Seller Rating</label>
    <select id="sellerRating">
      <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
      <option value="4">⭐⭐⭐⭐ Good</option>
      <option value="3">⭐⭐⭐ Average</option>
      <option value="2">⭐⭐ Poor</option>
      <option value="1">⭐ Bad</option>
    </select>

    <label>Delivery Rating</label>
    <select id="deliveryRating">
      <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
      <option value="4">⭐⭐⭐⭐ Good</option>
      <option value="3">⭐⭐⭐ Average</option>
      <option value="2">⭐⭐ Poor</option>
      <option value="1">⭐ Bad</option>
    </select>

    <label>Your Review</label>
    <textarea id="reviewText" placeholder="Write your experience with the seller, product, and delivery..."></textarea>

    <button id="submitReviewBtn">Submit Review</button>
    <p id="reviewMessage"></p>
  </section>
</main>

<script type="module" src="js/review.js"></script>
</body>
</html>
